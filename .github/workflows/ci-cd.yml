name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t sourav143/wisecow:${{ github.sha }} .
        docker tag sourav143/wisecow:${{ github.sha }} sourav143/wisecow:latest

    - name: Push Image
      run: |
        docker push sourav143/wisecow:${{ github.sha }}
        docker push sourav143/wisecow:latest